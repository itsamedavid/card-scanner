<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header { padding: 1rem; color: white; }
        .header h1 { font-size: 1.5rem; margin: 0; }
        .header p { font-size: 0.875rem; color: #94a3b8; margin: 0.25rem 0 0 0; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .video-box { flex: 1; background: black; margin: 1rem; border-radius: 1rem; border: 2px solid #334155; overflow: hidden; }
        .status { text-align: center; padding: 1rem; color: #cbd5e1; }
        .button-box { padding: 2rem 1rem; text-align: center; }
        button { width: 5rem; height: 5rem; border-radius: 50%; font-size: 2rem; border: 4px solid #1d4ed8; background: #2563eb; cursor: pointer; }
        button:disabled { background: #4b5563; border-color: #374151; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Card Scanner</h1>
        <p>Cards loaded: <span id="count">0</span></p>
    </div>
    
    <div class="container">
        <div class="video-box">
            <video id="video" autoplay playsinline muted webkit-playsinline></video>
        </div>
        
        <div class="status" id="status">Loading camera...</div>
        
        <div class="button-box">
            <button id="btn" onclick="capture()">📷</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const btn = document.getElementById('btn');
        const count = document.getElementById('count');
        let cardNum = 0;

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    status.textContent = 'Ready to scan';
                    btn.disabled = false;
                };
            } catch (err) {
                status.textContent = 'Camera error: ' + err.message;
                btn.disabled = true;
            }
        }

        async function capture() {
            if (!video || !video.srcObject) return;
            btn.disabled = true;
            status.textContent = 'Processing...';

            try {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);

                // Convert canvas to base64 string instead of blob
                const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

                status.textContent = 'Uploading...';
                
                const res = await fetch('https://script.google.com/macros/s/AKfycbwIh65K656NuVNYI3TFFCTUgFxVLaeFCA_7pFuzjvlwvctau7Z8k4Yo-YPhqzA7S91ObQ/exec', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageBase64: base64Image })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    cardNum = data.cardNumber;
                    count.textContent = cardNum;
                    status.textContent = '✓ Card ' + cardNum + ' loaded';
                    setTimeout(() => {
                        status.textContent = 'Ready to scan';
                        btn.disabled = false;
                    }, 1500);
                } else {
                    status.textContent = 'Error: ' + (data.error || 'Failed');
                    btn.disabled = false;
                }
            } catch (err) {
                status.textContent = 'Error: ' + err.message;
                btn.disabled = false;
            }
        }

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
