<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            position: relative;
            z-index: 10;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header-title {
            flex: 1;
        }
        
        .header-title h1 {
            color: #ffffff;
            font-weight: bold;
            font-size: 1.5rem;
            margin: 0;
        }
        
        .header-title p {
            color: #94a3b8;
            font-size: 0.875rem;
            margin: 0.25rem 0 0 0;
        }
        
        .header-title span {
            color: #60a5fa;
            font-weight: bold;
        }
        
        .settings-btn {
            padding: 0.75rem;
            border-radius: 0.5rem;
            background: rgba(51, 65, 85, 0.5);
            border: none;
            color: #cbd5e1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .camera-container {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 1rem;
            border-radius: 1rem;
            background: #000000;
            border: 2px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        canvas {
            display: none;
        }
        
        .corner-guides {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            top: 0;
            left: 0;
        }
        
        .status-container {
            position: relative;
            z-index: 10;
            padding: 0.75rem 1rem;
            text-align: center;
