<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Scanner</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }
        #root { width: 100%; height: 100vh; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const { Camera, Check, AlertCircle, Settings } = lucide;

        function CardCaptureApp() {
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [stream, setStream] = useState(null);
            const [capturing, setCapturing] = useState(false);
            const [status, setStatus] = useState('ready');
            const [message, setMessage] = useState('Ready to scan');
            const [scriptUrl] = useState('https://script.google.com/macros/s/AKfycbwIh65K656NuVNYI3TFFCTUgFxVLaeFCA_7pFuzjvlwvctau7Z8k4Yo-YPhqzA7S91ObQ/exec');
            const [showSettings, setShowSettings] = useState(false);
            const [cardCount, setCardCount] = useState(0);
            const audioContextRef = useRef(null);

            useEffect(() => {
                const initCamera = async () => {
                    try {
                        const mediaStream = await navigator.mediaDevices.getUserMedia({
                            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                        });
                        setStream(mediaStream);
                        if (videoRef.current) {
                            videoRef.current.srcObject = mediaStream;
                        }
                    } catch (err) {
                        setStatus('error');
                        setMessage('Camera access denied');
                    }
                };
                initCamera();
                return () => {
                    if (stream) {
                        stream.getTracks().forEach(track => track.stop());
                    }
                };
            }, []);

            const playBeep = (frequency = 800, duration = 200) => {
                try {
                    if (!audioContextRef.current) {
                        audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    const ctx = audioContextRef.current;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = frequency;
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration / 1000);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + duration / 1000);
                } catch (e) {
                    console.log('Audio not available');
                }
            };

            const playSuccessSound = () => {
                playBeep(1000, 100);
                setTimeout(() => playBeep(1200, 100), 150);
            };

            const capturePhoto = async () => {
                if (!videoRef.current || !canvasRef.current) {
                    setStatus('error');
                    setMessage('Camera error');
                    playBeep(400, 300);
                    return;
                }

                setCapturing(true);
                setStatus('uploading');
                setMessage('Processing card...');

                try {
                    const canvas = canvasRef.current;
                    const context = canvas.getContext('2d');
                    canvas.width = videoRef.current.videoWidth;
                    canvas.height = videoRef.current.videoHeight;
                    context.drawImage(videoRef.current, 0, 0);

                    canvas.toBlob(async (blob) => {
                        const formData = new FormData();
                        formData.append('image', blob, 'card.jpg');

                        try {
                            const response = await fetch(scriptUrl, {
                                method: 'POST',
                                body: formData
                            });

                            const result = await response.json();

                            if (result.success) {
                                setStatus('success');
                                setMessage(`✓ Card ${result.cardNumber} loaded`);
                                setCardCount(result.cardNumber);
                                playSuccessSound();
                                setTimeout(() => {
                                    setStatus('ready');
                                    setMessage('Ready to scan');
                                    setCapturing(false);
                                }, 1000);
                            } else {
                                setStatus('error');
                                setMessage(`Error: ${result.error || 'Failed'}`);
                                playBeep(400, 300);
                                setCapturing(false);
                            }
                        } catch (err) {
                            setStatus('error');
                            setMessage(`Upload failed`);
                            playBeep(400, 300);
                            setCapturing(false);
                        }
                    }, 'image/jpeg', 0.9);
                } catch (err) {
                    setStatus('error');
                    setMessage(`Camera error`);
                    playBeep(400, 300);
                    setCapturing(false);
                }
            };

            return (
                <div style={{width: '100%', height: '100vh', background: 'linear-gradient(135deg, #0f172a 0%, #1e293b 100%)', display: 'flex', flexDirection: 'column', position: 'relative', overflow: 'hidden'}}>
                    {showSettings && (
                        <div style={{position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.7)', backdropFilter: 'blur(4px)', zIndex: 50, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '1rem'}}>
                            <div style={{background: '#1e293b', borderRadius: '1rem', padding: '1.5rem', maxWidth: '360px', width: '100%', border: '1px solid #334155', boxShadow: '0 20px 25px -5px rgba(0,0,0,0.3)'}}>
                                <h2 style={{fontSize: '1.5rem', fontWeight: 'bold', color: '#ffffff', marginBottom: '1rem'}}>Configuration</h2>
                                <p style={{color: '#cbd5e1', fontSize: '0.875rem', marginBottom: '1rem'}}>Web app URL is configured and ready to use.</p>
                                <p style={{color: '#60a5fa', fontSize: '0.75rem', fontFamily: 'monospace', marginBottom: '1rem', wordBreak: 'break-all', background: '#0f172a', padding: '0.75rem', borderRadius: '0.375rem'}}>https://script.google.com/macros/s/AKfycbwIh65K656NuVNYI3TFFCTUgFxVLaeFCA_7pFuzjvlwvctau7Z8k4Yo-YPhqzA7S91ObQ/exec</p>
                                <button onClick={() => setShowSettings(false)} style={{width: '100%', padding: '0.75rem', borderRadius: '0.5rem', background: '#2563eb', border: 'none', color: '#ffffff', fontWeight: 'bold', cursor: 'pointer'}}>Close</button>
                            </div>
                        </div>
                    )}

                    <div style={{position: 'relative', zIndex: 10, paddingTop: '1rem', paddingLeft: '1rem', paddingRight: '1rem', display: 'flex', alignItems: 'center', justifyContent: 'space-between'}}>
                        <div style={{flex: 1}}>
                            <h1 style={{color: '#ffffff', fontWeight: 'bold', fontSize: '1.5rem', margin: 0}}>Card Scanner</h1>
                            <p style={{color: '#94a3b8', fontSize: '0.875rem', margin: '0.25rem 0 0 0'}}>Cards loaded: <span style={{color: '#60a5fa', fontWeight: 'bold'}}>{cardCount}</span></p>
                        </div>
                        <button onClick={() => setShowSettings(true)} style={{padding: '0.75rem', borderRadius: '0.5rem', background: 'rgba(51,65,85,0.5)', border: 'none', color: '#cbd5e1', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center'}}>
                            <Settings size={24} />
                        </button>
                    </div>

                    <div style={{position: 'relative', zIndex: 10, flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden', margin: '1rem', borderRadius: '1rem', background: '#000000', border: '2px solid #334155', boxShadow: '0 20px 25px -5px rgba(0,0,0,0.3)'}}>
                        <video ref={videoRef} autoPlay playsInline style={{width: '100%', height: '100%', objectFit: 'cover'}} />
                        <canvas ref={canvasRef} style={{display: 'none'}} />
                        <svg style={{position: 'absolute', width: '100%', height: '100%', pointerEvents: 'none'}} viewBox="0 0 100 100" preserveAspectRatio="none">
                            <g stroke="rgba(59,130,246,0.5)" strokeWidth="0.5" fill="none">
                                <line x1="10" y1="10" x2="25" y2="10" />
                                <line x1="10" y1="10" x2="10" y2="25" />
                                <line x1="90" y1="10" x2="75" y2="10" />
                                <line x1="90" y1="10" x2="90" y2="25" />
                                <line x1="10" y1="90" x2="25" y2="90" />
                                <line x1="10" y1="90" x2="10" y2="75" />
                                <line x1="90" y1="90" x2="75" y2="90" />
                                <line x1="90" y1="90" x2="90" y2="75" />
                            </g>
                        </svg>
                    </div>

                    <div style={{position: 'relative', zIndex: 10, paddingLeft: '1rem', paddingRight: '1rem', paddingTop: '0.75rem', paddingBottom: '0.75rem', textAlign: 'center'}}>
                        <div style={{display: 'inline-flex', alignItems: 'center', gap: '0.5rem', paddingLeft: '1rem', paddingRight: '1rem', paddingTop: '0.5rem', paddingBottom: '0.5rem', borderRadius: '9999px', fontWeight: '600', fontSize: '0.875rem', color: status === 'success' ? '#86efac' : status === 'uploading' ? '#fef08a' : status === 'error' ? '#fca5a5' : '#cbd5e1'}}>
                            {status === 'success' && <Check size={20} />}
                            {status === 'uploading' && <div style={{width: '1.25rem', height: '1.25rem', border: '2px solid #fef08a', borderTopColor: 'transparent', borderRadius: '50%', animation: 'spin 1s linear infinite'}}></div>}
                            {status === 'error' && <AlertCircle size={20} />}
                            {message}
                        </div>
                    </div>

                    <div style={{position: 'relative', zIndex: 10, paddingBottom: '2rem', paddingLeft: '1rem', paddingRight: '1rem', display: 'flex', justifyContent: 'center'}}>
                        <button onClick={capturePhoto} disabled={capturing} style={{width: '6rem', height: '6rem', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 'bold', fontSize: '1.125rem', transition: 'all 0.2s', boxShadow: '0 20px 25px -5px rgba(0,0,0,0.3)', border: '4px solid', cursor: capturing ? 'not-allowed' : 'pointer', background: capturing ? '#eab308' : '#2563eb', borderColor: capturing ? '#ca8a04' : '#1d4ed8', color: '#ffffff'}}>
                            <Camera size={40} />
                        </button>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<CardCaptureApp />, document.getElementById('root'));
    </script>
</body>
</html>
